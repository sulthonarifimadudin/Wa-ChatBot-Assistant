version: '3.8'

services:
  # ─────────────────────────────────────────────
  # PostgreSQL Database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: wa-assistant-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wa_assistant
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # WA AI Assistant Application
  # ─────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wa-assistant-app
    env_file: .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/wa_assistant
      TZ: Asia/Jakarta
    ports:
      - '3000:3000'
    volumes:
      - ./auth:/app/auth        # Persist WhatsApp auth state
      - ./media:/app/media      # Persist downloaded media
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    # Run migrations before starting the app
    command: >
      sh -c "npx prisma migrate deploy && node dist/app.js"

volumes:
  postgres_data:
